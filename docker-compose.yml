version: "3.9"

services:
  app:
    build: .
    ports:
      - "80:80"
    env_file:
      - .env
    volumes:
      - emails_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  emails_data:
